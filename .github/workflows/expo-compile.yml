name: EAS Build Artifact Upload
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: |
            - recursive: true
              args: [--strict-peer-dependencies]
            - args: [--global, gulp, prettier, typescript]

      - name: 📦 Install dependencies
        run: pnpm install

      - name: � Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: ⚙️ Build Android (EAS Local)
        id: build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          pnpm dlx eas-cli build --platform android --local --non-interactive
          BUILD_ARTIFACT=$(find . -maxdepth 1 -name "build-*.aab" -type f | head -1)
          if [ -z "$BUILD_ARTIFACT" ]; then
            echo "error=Build artifact not found"
            exit 1
          fi
          echo "artifact_path=$BUILD_ARTIFACT" >> $GITHUB_OUTPUT
        shell: bash

      - name: Convert aab to apk
        id: convert_aab
        uses: ethanneff/bundletool-action@v1.0.0
        with:
          aabFile: ${{ steps.build.outputs.artifact_path }}
          base64Keystore: ${{ secrets.BASE64_KEY }}
          keystorePassword: ${{ secrets.PASSWORD }}
          keystoreAlias: ${{ secrets.ALIAS }}
          keyPassword: ${{ secrets.PASSWORD }}
          bundleToolVersion: "1.9.0"

      - uses: actions/upload-artifact@v3
        with:
          name: release-apk
          path: ${{ steps.convert_aab.outputs.apkPath }}
