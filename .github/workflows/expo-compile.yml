name: EAS Build
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: |
            - recursive: true
              args: [--strict-peer-dependencies]
            - args: [--global, gulp, prettier, typescript]

      - name: 📦 Install dependencies
        run: pnpm install

      - name: � Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: ⚙️ Build Android (EAS Local)
        id: build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          pnpm dlx eas-cli build --platform android --local --non-interactive
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "error=APK not found in build output"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
        shell: bash

      - name: 📋 Copy APK
        if: steps.build.outputs.apk_path != ''
        run: |
          cp "${{ steps.build.outputs.apk_path }}" app.apk
        shell: bash

      - name: 📤 Upload APK artifact
        if: steps.build.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app.apk
